# Docs:
# - `supervisord.conf`: https://supervisord.org/configuration.html
# - Config Syntax: https://docs.python.org/3/library/configparser.html#supported-ini-file-structure

[supervisord]
# Assign user to avoid a CRIT log
user = root
#loglevel = debug
nodaemon = true

logfile = /var/log/supervisor/supervisord.log
pidfile = /run/supervisord.pid

# Configures the `AUTO` log directory for individual service logs:
childlogdir = /var/log/supervisor
# This opt-out allows persisting `AUTO` log files across `supervisord` runs:
nocleanup = true

# TIP: If using `supervisorctl tail` ANSI sequences must be stripped:
# https://github.com/Supervisor/supervisor/issues/85
#strip_ansi = true

[include]
files = /etc/supervisor/conf.d/*.conf

# Below config sections are for `supervisorctl` support:

[unix_http_server]
file = /run/supervisor.sock

[supervisorctl]
serverurl = unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
